<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דשבורד לידים | גך נפי חינוך</title>
  <!-- v2.1 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:       #2d2b72;
      --primary-mid:   #4338ca;
      --primary-light: #eef2ff;
      --accent:        #c084fc;
      --danger:        #ef4444;
      --surface:       #ffffff;
      --bg:            #f4f5fb;
      --border:        #e4e6f0;
      --text:          #1a1a3e;
      --muted:         #6b7080;
      --radius:        16px;
      --radius-sm:     10px;
      --shadow:        0 1px 4px rgba(0,0,0,.05), 0 4px 18px rgba(0,0,0,.07);
      --shadow-hover:  0 6px 24px rgba(45,43,114,.18);
    }
    body { font-family: 'Assistant', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 68px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 300;
      box-shadow: 0 2px 12px rgba(45,43,114,.08);
    }
    .brand-logo { height: 44px; flex-shrink: 0; }
    .header-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
    .header-title { font-size: .85rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    #last-updated { font-size: .68rem; color: var(--muted); margin-right: auto; white-space: nowrap; }

    .view-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 3px; gap: 2px; flex-shrink: 0; }
    .view-btn {
      border: none; background: transparent; color: var(--muted);
      padding: 7px 18px; border-radius: 9px; font-size: .8rem; font-weight: 700;
      cursor: pointer; transition: all .18s; white-space: nowrap; font-family: inherit;
    }
    .view-btn.active { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(45,43,114,.3); }
    .view-btn:not(.active):hover { background: var(--primary-light); color: var(--primary); }

    /* ── MAIN ── */
    main { padding: 22px 28px; max-width: 1560px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; flex: 1; }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 22px 14px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .filter-top { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
    .fg { display: flex; flex-direction: column; gap: 5px; }
    .fg label { font-size: .65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
    .fg input[type=date] {
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: 8px 10px; font-size: .82rem; color: var(--text); background: var(--bg);
      outline: none; transition: border-color .15s, background .15s; font-family: inherit; min-width: 130px;
    }
    .fg input[type=date]:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(45,43,114,.08); }
    .fg input[type=date].has-value { border-color: var(--primary); background: var(--primary-light); font-weight: 600; }

    .filter-sep { width: 1px; height: 36px; background: var(--border); margin: 0 2px; align-self: flex-end; }

    /* shortcuts */
    .fg-sc { display: flex; flex-direction: column; gap: 5px; }
    .fg-sc label { font-size: .65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
    .shortcuts { display: flex; gap: 4px; }
    .sc-btn {
      font-size: .71rem; border: 1.5px solid var(--border); background: var(--bg);
      border-radius: 20px; padding: 6px 12px; cursor: pointer; color: var(--muted);
      font-weight: 700; transition: all .15s; white-space: nowrap; font-family: inherit;
    }
    .sc-btn:hover { border-color: var(--primary-mid); color: var(--primary-mid); background: var(--primary-light); }
    .sc-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 2px 6px rgba(45,43,114,.25); }

    .btn-reset {
      margin-right: auto; font-size: .78rem; border: 1.5px solid var(--border);
      background: var(--surface); border-radius: var(--radius-sm); padding: 8px 16px;
      cursor: pointer; color: var(--muted); font-weight: 700; transition: all .15s;
      align-self: flex-end; font-family: inherit;
    }
    .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

    /* chips */
    .active-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .active-chips:empty { display: none; }
    .chip {
      display: flex; align-items: center; gap: 5px; background: var(--primary-light);
      color: var(--primary); border-radius: 20px; padding: 3px 10px 3px 6px;
      font-size: .71rem; font-weight: 700; border: 1px solid rgba(45,43,114,.15);
    }
    .chip-x {
      cursor: pointer; width: 14px; height: 14px; background: var(--primary); color: #fff;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: .58rem; font-weight: 900; flex-shrink: 0; transition: background .15s;
    }
    .chip-x:hover { background: var(--danger); }

    /* ── MULTI-SELECT ── */
    .ms-wrap { position: relative; }
    .ms-btn {
      display: flex; align-items: center; gap: 6px; justify-content: space-between;
      min-width: 130px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: 8px 10px; font-size: .82rem; color: var(--text); background: var(--bg);
      cursor: pointer; font-family: inherit; font-weight: 500; transition: all .15s; text-align: right;
    }
    .ms-btn:hover { border-color: var(--primary-mid); }
    .ms-btn.has-value { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 700; }
    .ms-btn .ms-cnt {
      background: var(--primary); color: #fff; border-radius: 20px;
      font-size: .65rem; font-weight: 800; padding: 1px 7px; white-space: nowrap;
    }
    .ms-arrow { font-size: .65rem; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
    .ms-btn[aria-expanded=true] .ms-arrow { transform: rotate(180deg); }

    .ms-panel {
      display: none; position: absolute; top: calc(100% + 4px); right: 0;
      min-width: 210px; max-height: 260px; overflow-y: auto;
      background: #fff; border: 1.5px solid var(--border); border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.14); z-index: 500;
    }
    .ms-panel.open { display: block; }
    .ms-search { padding: 10px 12px 6px; border-bottom: 1px solid var(--border); }
    .ms-search input {
      width: 100%; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 10px; font-size: .8rem; font-family: inherit; outline: none;
      color: var(--text);
    }
    .ms-search input:focus { border-color: var(--primary); }
    .ms-opt {
      display: flex; align-items: center; gap: 9px; padding: 9px 14px;
      cursor: pointer; font-size: .82rem; transition: background .1s; user-select: none;
    }
    .ms-opt:hover { background: #f8f9ff; }
    .ms-opt input[type=checkbox] { accent-color: var(--primary); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
    .ms-opt.ms-all { border-bottom: 1px solid var(--border); font-weight: 700; color: var(--muted); }
    .ms-opt.hidden { display: none; }

    /* ── VIEWS ── */
    #view-dashboard { display: flex; flex-direction: column; gap: 18px; }
    #view-tables    { display: none; flex-direction: column; gap: 18px; }

    /* ── KPI ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 14px; }
    .kpi-card {
      background: var(--surface); border-radius: var(--radius); padding: 20px 20px 16px;
      box-shadow: var(--shadow); border: 1px solid var(--border); position: relative;
      overflow: hidden; transition: transform .2s, box-shadow .2s; cursor: default;
    }
    .kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .kpi-accent { position: absolute; top: 0; right: 0; left: 0; height: 4px; background: var(--kc, var(--primary)); }
    .kpi-label { font-size: .65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
    .kpi-value { font-size: 2.2rem; font-weight: 900; color: var(--kc, var(--primary)); line-height: 1; }
    .kpi-pct { font-size: .7rem; color: var(--muted); margin-top: 6px; }

    /* ── CHARTS ── */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:800px) { .charts-row { grid-template-columns: 1fr; } }
    .chart-card { background: var(--surface); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .chart-card h3 { font-size: .65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 210px; }

    /* ── TABLES ── */
    .pivot-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
    .pivot-head { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: #fafbff; }
    .pivot-head h3 { font-size: .9rem; font-weight: 800; }
    .pivot-total-badge { background: var(--primary-light); color: var(--primary); border-radius: 20px; padding: 3px 12px; font-size: .74rem; font-weight: 700; }
    .raw-badge { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; border-radius: 20px; padding: 3px 12px; font-size: .73rem; font-weight: 700; }
    .export-btn {
      margin-right: auto; font-size: .73rem; border: 1.5px solid var(--border);
      background: var(--surface); border-radius: 8px; padding: 6px 14px;
      cursor: pointer; color: var(--muted); font-weight: 700; transition: all .15s; font-family: inherit;
    }
    .export-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .tbl-wrap { overflow-x: auto; }
    .raw-table-wrap { overflow-x: auto; max-height: 480px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    th { background: linear-gradient(to bottom, #f0f2ff, #f8fafc); padding: 11px 14px; text-align: right; font-size: .65rem; color: var(--primary); font-weight: 800; border-bottom: 2px solid #c7d2fe; white-space: nowrap; letter-spacing: .04em; position: sticky; top: 0; z-index: 1; }
    td { padding: 11px 14px; border-bottom: 1px solid #f0f1f8; white-space: nowrap; }
    tr:nth-child(even) td { background: #fafbff; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #eef2ff !important; }
    .total-row td { background: linear-gradient(to left, #eef2ff, #e0e7ff) !important; font-weight: 800; border-top: 2px solid #c7d2fe; color: var(--primary); }
    .total-col { font-weight: 700; color: var(--primary); }
    .row-name { font-weight: 700; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
    .num { text-align: center; }
    .zero { color: #d1d5db; }
    /* status badges */
    .status-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700; white-space: nowrap; }
    /* pivot table colored header accent */
    .pivot-card:nth-child(1) .pivot-head { border-right: 4px solid #4338ca; }
    .pivot-card:nth-child(2) .pivot-head { border-right: 4px solid #7c3aed; }
    .pivot-card:nth-child(3) .pivot-head { border-right: 4px solid #c084fc; }
    .pivot-card:nth-child(4) .pivot-head { border-right: 4px solid #f59e0b; }

    /* ── EMPTY STATE ── */
    .state-msg { padding: 48px 24px; text-align: center; color: var(--muted); }
    .state-msg .icon { font-size: 2.2rem; display: block; margin-bottom: 10px; opacity: .35; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-msg { color: var(--danger); }
    .btn-clear-filters {
      margin-top: 12px; display: inline-block; font-size: .8rem; font-weight: 700;
      color: var(--primary); background: var(--primary-light); border: none;
      border-radius: 8px; padding: 7px 16px; cursor: pointer; font-family: inherit;
    }

    /* ── FOOTER ── */
    footer {
      background: #fff; border-top: 1px solid var(--border);
      padding: 14px 28px; display: flex; align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: .75rem;
    }
    footer img { height: 32px; }

    @media(max-width:640px) { header { padding: 0 14px; } main { padding: 12px 14px; } }
  </style>
</head>
<body>

<header>
  <img src="/logo.png" class="brand-logo" alt="גך נפי חינוך" />
  <div class="header-divider"></div>
  <span class="header-title">דשבורד לידים</span>
  <div class="view-toggle">
    <button class="view-btn active" data-view="dashboard">📈 דשבורד</button>
    <button class="view-btn" data-view="tables">📋 טבלאות</button>
  </div>
  <span id="last-updated"></span>
</header>

<main>
  <!-- FILTERS -->
  <div class="filter-bar">
    <div class="filter-top">

      <div class="fg">
        <label>מתאריך</label>
        <input type="date" id="f-from" />
      </div>
      <div class="fg">
        <label>עד תאריך</label>
        <input type="date" id="f-to" />
      </div>

      <div class="fg-sc">
        <label>קיצור מהיר</label>
        <div class="shortcuts">
          <button class="sc-btn" data-r="today">היום</button>
          <button class="sc-btn" data-r="week">שבוע</button>
          <button class="sc-btn" data-r="month">חודש</button>
          <button class="sc-btn" data-r="year">שנה</button>
          <button class="sc-btn active" data-r="all">הכל</button>
        </div>
      </div>

      <div class="filter-sep"></div>

      <div class="fg">
        <label>נציג אחראי</label>
        <div class="ms-wrap" id="ms-responsible">
          <button class="ms-btn" type="button" aria-expanded="false">
            <span class="ms-label">הכל</span>
            <span class="ms-cnt" style="display:none"></span>
            <span class="ms-arrow">▾</span>
          </button>
          <div class="ms-panel">
            <div class="ms-search"><input type="text" placeholder="חיפוש..." /></div>
            <label class="ms-opt ms-all"><input type="checkbox" checked /> הכל</label>
          </div>
        </div>
      </div>

      <div class="fg">
        <label>מקור ליד</label>
        <div class="ms-wrap" id="ms-source">
          <button class="ms-btn" type="button" aria-expanded="false">
            <span class="ms-label">הכל</span>
            <span class="ms-cnt" style="display:none"></span>
            <span class="ms-arrow">▾</span>
          </button>
          <div class="ms-panel">
            <div class="ms-search"><input type="text" placeholder="חיפוש..." /></div>
            <label class="ms-opt ms-all"><input type="checkbox" checked /> הכל</label>
          </div>
        </div>
      </div>

      <div class="fg">
        <label>עיר</label>
        <div class="ms-wrap" id="ms-city">
          <button class="ms-btn" type="button" aria-expanded="false">
            <span class="ms-label">הכל</span>
            <span class="ms-cnt" style="display:none"></span>
            <span class="ms-arrow">▾</span>
          </button>
          <div class="ms-panel">
            <div class="ms-search"><input type="text" placeholder="חיפוש..." /></div>
            <label class="ms-opt ms-all"><input type="checkbox" checked /> הכל</label>
          </div>
        </div>
      </div>

      <div class="fg">
        <label>סטטוס ליד</label>
        <div class="ms-wrap" id="ms-status">
          <button class="ms-btn" type="button" aria-expanded="false">
            <span class="ms-label">הכל</span>
            <span class="ms-cnt" style="display:none"></span>
            <span class="ms-arrow">▾</span>
          </button>
          <div class="ms-panel">
            <div class="ms-search"><input type="text" placeholder="חיפוש..." /></div>
            <label class="ms-opt ms-all"><input type="checkbox" checked /> הכל</label>
          </div>
        </div>
      </div>

      <button class="btn-reset" id="btn-reset">↺ איפוס</button>
    </div>
    <div class="active-chips" id="active-chips"></div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="view-dashboard">
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card"><div class="kpi-accent"></div><div class="kpi-label">טוען...</div><div class="kpi-value">—</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card"><h3>לפי נציג אחראי</h3><div class="chart-wrap" id="wrap-chart-responsible"><canvas id="chart-responsible"></canvas></div></div>
      <div class="chart-card"><h3>לפי מקור ליד</h3><div class="chart-wrap" id="wrap-chart-source"><canvas id="chart-source"></canvas></div></div>
      <div class="chart-card"><h3>לפי סטטוס</h3><div class="chart-wrap" id="wrap-chart-status"><canvas id="chart-status"></canvas></div></div>
      <div class="chart-card"><h3>לפי עיר</h3><div class="chart-wrap" id="wrap-chart-city"><canvas id="chart-city"></canvas></div></div>
    </div>
  </div>

  <!-- TABLES VIEW -->
  <div id="view-tables">
    <div class="pivot-card">
      <div class="pivot-head"><h3>לפי נציג אחראי</h3><span class="pivot-total-badge" id="badge-responsible">0</span><button class="export-btn" onclick="exportPivot('responsible')">⬇ Excel</button></div>
      <div class="tbl-wrap"><table id="tbl-responsible"><thead></thead><tbody></tbody></table></div>
    </div>
    <div class="pivot-card">
      <div class="pivot-head"><h3>לפי מקור ליד</h3><span class="pivot-total-badge" id="badge-source">0</span><button class="export-btn" onclick="exportPivot('source')">⬇ Excel</button></div>
      <div class="tbl-wrap"><table id="tbl-source"><thead></thead><tbody></tbody></table></div>
    </div>
    <div class="pivot-card">
      <div class="pivot-head"><h3>לפי עיר</h3><span class="pivot-total-badge" id="badge-city">0</span><button class="export-btn" onclick="exportPivot('city')">⬇ Excel</button></div>
      <div class="tbl-wrap"><table id="tbl-city"><thead></thead><tbody></tbody></table></div>
    </div>
    <div class="pivot-card">
      <div class="pivot-head"><h3>כל הנתונים הגולמיים</h3><span class="raw-badge" id="badge-raw">0</span><button class="export-btn" onclick="exportRaw()">⬇ Excel</button></div>
      <div class="raw-table-wrap"><table id="tbl-raw"><thead></thead><tbody></tbody></table></div>
    </div>
  </div>
</main>

<footer>
  <span>נבנה ע"י</span>
  <img src="/logorivka.gif" alt="Rivka" />
</footer>

<script>
// ── STATE ─────────────────────────────────────────────────────────
const S = {
  all: [], filtered: [],
  filters: { from: '', to: '', responsible: [], source: [], city: [], status: [] },
};
const ALL_OPTIONS = { responsible: [], source: [], city: [], status: [] };
const CHARTS = {};
const PAL = ['#2d2b72','#4338ca','#7c3aed','#c084fc','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#0ea5e9','#84cc16','#f97316','#14b8a6'];

// ── MULTISELECT CLASS ─────────────────────────────────────────────
class MultiSelect {
  constructor(wrapperId, filterKey, onChange) {
    this.wrap    = document.getElementById(wrapperId);
    this.btn     = this.wrap.querySelector('.ms-btn');
    this.panel   = this.wrap.querySelector('.ms-panel');
    this.label   = this.btn.querySelector('.ms-label');
    this.cnt     = this.btn.querySelector('.ms-cnt');
    this.search  = this.wrap.querySelector('.ms-search input');
    this.allOpt  = this.wrap.querySelector('.ms-all input');
    this.key     = filterKey;
    this.selected = new Set();
    this.onChange = onChange;

    this.btn.addEventListener('click', e => { e.stopPropagation(); this.toggle(); });
    this.search.addEventListener('input', () => this.filterOptions());
    this.allOpt.addEventListener('change', () => {
      this.selected.clear();
      this.wrap.querySelectorAll('.ms-opt:not(.ms-all) input').forEach(cb => cb.checked = false);
      this.allOpt.checked = true;
      this.updateUI();
      this.onChange(this.key, []);
    });
    document.addEventListener('click', e => { if (!this.wrap.contains(e.target)) this.close(); });
  }

  toggle() {
    const isOpen = this.panel.classList.contains('open');
    document.querySelectorAll('.ms-panel.open').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.ms-btn').forEach(b => b.setAttribute('aria-expanded','false'));
    if (!isOpen) {
      this.panel.classList.add('open');
      this.btn.setAttribute('aria-expanded','true');
      this.search.focus();
    }
  }

  close() {
    this.panel.classList.remove('open');
    this.btn.setAttribute('aria-expanded','false');
  }

  setOptions(values) {
    const existing = [...this.wrap.querySelectorAll('.ms-opt:not(.ms-all)')];
    const existingVals = existing.map(el => el.querySelector('input').value);
    // Add new values
    values.forEach(v => {
      if (!existingVals.includes(v)) {
        const lbl = document.createElement('label');
        lbl.className = 'ms-opt';
        const id = `${this.wrap.id}-${Math.random().toString(36).slice(2)}`;
        lbl.innerHTML = `<input type="checkbox" id="${id}" value="${esc(v)}" ${this.selected.has(v)?'checked':''}><span>${esc(v)}</span>`;
        lbl.querySelector('input').addEventListener('change', cb => {
          if (cb.target.checked) this.selected.add(v);
          else this.selected.delete(v);
          this.allOpt.checked = this.selected.size === 0;
          this.updateUI();
          this.onChange(this.key, [...this.selected]);
        });
        this.panel.appendChild(lbl);
      }
    });
    this.filterOptions();
  }

  filterOptions() {
    const q = this.search.value.trim().toLowerCase();
    this.wrap.querySelectorAll('.ms-opt:not(.ms-all)').forEach(opt => {
      const txt = opt.querySelector('span')?.textContent?.toLowerCase() ?? '';
      opt.classList.toggle('hidden', q !== '' && !txt.includes(q));
    });
  }

  updateUI() {
    const n = this.selected.size;
    if (n === 0) {
      this.label.textContent = 'הכל';
      this.cnt.style.display = 'none';
      this.btn.classList.remove('has-value');
    } else {
      this.label.textContent = n === 1 ? [...this.selected][0] : `${n} נבחרו`;
      this.cnt.textContent = n;
      this.cnt.style.display = 'inline';
      this.btn.classList.add('has-value');
    }
  }

  clear() {
    this.selected.clear();
    this.search.value = '';
    this.wrap.querySelectorAll('.ms-opt:not(.ms-all) input').forEach(cb => cb.checked = false);
    this.allOpt.checked = true;
    this.filterOptions();
    this.updateUI();
  }

  getSelected() { return [...this.selected]; }
}

// ── INIT MULTI-SELECTS ────────────────────────────────────────────
function onFilterChange(key, vals) {
  S.filters[key] = vals;
  applyFilters();
}
const MS = {
  responsible: new MultiSelect('ms-responsible', 'responsible', onFilterChange),
  source:      new MultiSelect('ms-source',      'source',      onFilterChange),
  city:        new MultiSelect('ms-city',         'city',        onFilterChange),
  status:      new MultiSelect('ms-status',       'status',      onFilterChange),
};

// ── PARSING ───────────────────────────────────────────────────────
function pick(obj, ...keys) {
  for (const k of keys) {
    const v = obj[k];
    if (v !== undefined && v !== null && v !== '') return String(v);
  }
  return '';
}

function parseFieldGroups(inst) {
  if (!inst) return {};
  const f = {};
  for (const grp of inst.field_groups || []) {
    for (const row of grp.fields_data || []) {
      if (!Array.isArray(row)) continue;
      for (const fld of row) {
        if (!fld || !fld.field_name) continue;
        let v = fld.value;
        if (v && typeof v === 'object' && !Array.isArray(v) && v.text !== undefined) v = v.text;
        if (Array.isArray(v) && v.length > 0 && v[0]?.text !== undefined) v = v.map(x => x.text).join(', ');
        if (v !== undefined && v !== null && v !== '') {
          f[fld.field_name.trim()] = v;
          if (fld.field_data_name) f[fld.field_data_name.trim()] = v;
        }
      }
    }
  }
  return f;
}

function mapFields(f) {
  const first = pick(f, 'שם פרטי');
  const last  = pick(f, 'שם משפחה');
  const full  = pick(f, 'שם מלא', 'שם', 'שם הליד', 'שם ושם משפחה');
  const name  = (first || last)
    ? [first, last].filter(Boolean).join(' ')
    : full.replace(/^(גב'|מר|הרב|ד"ר)\s*/u, '').trim();
  return {
    name,
    phone:       pick(f, 'נייד','טלפון','טלפון בית','פלאפון','מספר טלפון'),
    city:        pick(f, 'עיר','שם העיר','יישוב'),
    source:      pick(f, 'מקור הליד','מקור הגעה','מקור','מקור ליד'),
    responsible: pick(f, 'אחראי מטפל','נציג אחראי','משתמש אחראי'),
    status:      pick(f, 'סטטוס ליד','סטטוס'),
  };
}

function normalizeLeads(json) {
  const raw = Array.isArray(json.data) ? json.data : [];
  if (!raw.length) { console.warn('אין רשומות ב-json.data', Object.keys(json)); return []; }
  const hasWrapper = raw[0]?.instance_data !== undefined;
  const items = hasWrapper ? raw.map(r => r.instance_data).filter(Boolean) : raw;
  console.log(`📊 ${items.length} רשומות | פורמט: ${hasWrapper ? 'instance_data' : 'flat'}`);
  if (items[0]) console.log('🔑 שדות:', Object.keys(hasWrapper ? parseFieldGroups(items[0]) : items[0]));
  return items.map((inst, i) => {
    const f = hasWrapper ? parseFieldGroups(inst) : inst;
    const ts = inst?.insertTimestamp ?? inst?.created_at ?? '';
    return { id: inst?._id ?? i, date: ts.slice(0,10), ...mapFields(f), raw: f };
  });
}

// ── LOAD ─────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('kpi-grid').innerHTML = `<div class="state-msg"><div class="spinner"></div><div>טוען נתונים...</div></div>`;
  try {
    const [leadsRes, optionsRes] = await Promise.all([
      fetch('/api/leads'),
      fetch('/api/filter-options'),
    ]);
    if (!leadsRes.ok)   throw new Error(`שגיאת שרת ${leadsRes.status}`);
    const json    = await leadsRes.json();
    if (json.error) throw new Error(json.error);
    S.all = normalizeLeads(json);

    // Populate filters from entities (all options, not just what's in leads)
    if (optionsRes.ok) {
      const opts = await optionsRes.json();
      if (!opts.error) {
        ALL_OPTIONS.city        = opts.cities        || [];
        ALL_OPTIONS.source      = opts.sources       || [];
        ALL_OPTIONS.responsible = opts.responsibles  || [];
        MS.city.setOptions(ALL_OPTIONS.city);
        MS.source.setOptions(ALL_OPTIONS.source);
        MS.responsible.setOptions(ALL_OPTIONS.responsible);
      }
    }
    // Status always from actual lead data
    ALL_OPTIONS.status = [...new Set(S.all.map(l => l.status).filter(Boolean))].sort();
    MS.status.setOptions(ALL_OPTIONS.status);

    applyFilters();
    document.getElementById('last-updated').textContent = `עדכון: ${new Date().toLocaleTimeString('he-IL')}`;
  } catch(e) {
    document.getElementById('kpi-grid').innerHTML = `<div class="state-msg err-msg"><span class="icon">⚠️</span>${esc(e.message)}</div>`;
  }
}

// ── FILTERS ──────────────────────────────────────────────────────
function populateFilters() {
  // Called as fallback only — main population happens in loadData from entities
  const uniq = k => [...new Set(S.all.map(l => l[k]).filter(Boolean))].sort();
  MS.status.setOptions(uniq('status'));
}

function applyFilters() {
  const { from, to, responsible, source, city, status } = S.filters;
  S.filtered = S.all.filter(l => {
    if (from && l.date < from) return false;
    if (to   && l.date > to)   return false;
    if (responsible.length && !responsible.includes(l.responsible)) return false;
    if (source.length      && !source.includes(l.source))           return false;
    if (city.length        && !city.includes(l.city))               return false;
    if (status.length      && !status.includes(l.status))           return false;
    return true;
  });
  renderChips();
  renderDashboard();
  renderAllPivots();
}

// ── CHIPS ─────────────────────────────────────────────────────────
const DIM_LABEL = { responsible: 'נציג', source: 'מקור', city: 'עיר', status: 'סטטוס' };
function renderChips() {
  const el = document.getElementById('active-chips');
  const chips = [];
  for (const [k, vals] of Object.entries(S.filters)) {
    if (!Array.isArray(vals) || !vals.length) continue;
    vals.forEach(v => chips.push(`<div class="chip"><div class="chip-x" onclick="removeChip('${k}','${esc(v)}')">✕</div>${DIM_LABEL[k]}: ${esc(v)}</div>`));
  }
  if (S.filters.from || S.filters.to) {
    const r = [S.filters.from && `מ-${S.filters.from}`, S.filters.to && `עד ${S.filters.to}`].filter(Boolean).join(' ');
    chips.push(`<div class="chip"><div class="chip-x" onclick="clearDate()">✕</div>${esc(r)}</div>`);
  }
  el.innerHTML = chips.join('');
}

function removeChip(key, val) {
  S.filters[key] = S.filters[key].filter(v => v !== val);
  MS[key]?.selected.delete(val);
  MS[key]?.updateUI();
  const cb = MS[key]?.wrap.querySelector(`.ms-opt:not(.ms-all) input[value="${val}"]`);
  if (cb) cb.checked = false;
  if (!S.filters[key].length && MS[key]) MS[key].allOpt.checked = true;
  applyFilters();
}
function clearDate() {
  S.filters.from = ''; S.filters.to = '';
  document.getElementById('f-from').value = '';
  document.getElementById('f-to').value = '';
  document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-r="all"]').classList.add('active');
  applyFilters();
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function renderDashboard() {
  const leads = S.filtered;
  const total = leads.length;
  const byStatus = groupBy(leads, 'status');

  const kpis = [
    { label: 'סה״כ לידים', val: total, color: PAL[0] },
    ...Object.entries(byStatus).map(([s,n],i) => ({ label: s||'ללא סטטוס', val: n, color: PAL[(i+1)%PAL.length] })),
  ];

  if (!total) {
    document.getElementById('kpi-grid').innerHTML = `<div class="state-msg"><span class="icon">🔍</span>אין תוצאות לסינון הנוכחי<br><button class="btn-clear-filters" onclick="resetAll()">נקה סינון</button></div>`;
  } else {
    document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
      <div class="kpi-card" style="--kc:${k.color}">
        <div class="kpi-accent"></div>
        <div class="kpi-label">${esc(k.label)}</div>
        <div class="kpi-value">${k.val}</div>
        <div class="kpi-pct">${total && k.label !== 'סה״כ לידים' ? Math.round(k.val/total*100)+'%' : '&nbsp;'}</div>
      </div>`).join('');
  }

  renderBar('chart-responsible', groupBy(leads,'responsible'));
  renderBar('chart-source',      groupBy(leads,'source'));
  renderBar('chart-city',        groupBy(leads,'city'));
  renderDoughnut('chart-status', byStatus);
}

function groupBy(arr, key) {
  const out = {};
  for (const l of arr) { const v = l[key]||'ללא'; out[v]=(out[v]||0)+1; }
  return out;
}

function renderChart(id, type, data, extraOpts) {
  const wrap = document.getElementById('wrap-' + id);
  if (!wrap) return;

  if (CHARTS[id]) { CHARTS[id].destroy(); delete CHARTS[id]; }

  // Always restore canvas (never let it disappear)
  let canvas = document.getElementById(id);
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = id;
    wrap.innerHTML = '';
    wrap.appendChild(canvas);
  }

  const labels = Object.keys(data), values = Object.values(data);

  // Show/hide empty message
  let emptyEl = wrap.querySelector('.chart-empty');
  if (!emptyEl) {
    emptyEl = document.createElement('div');
    emptyEl.className = 'chart-empty state-msg';
    emptyEl.innerHTML = '<span class="icon">📭</span>אין נתונים';
    wrap.appendChild(emptyEl);
  }
  canvas.style.display   = labels.length ? '' : 'none';
  emptyEl.style.display  = labels.length ? 'none' : '';
  if (!labels.length) return;

  CHARTS[id] = new Chart(canvas.getContext('2d'), { type, data: { labels, datasets: extraOpts.datasets(values, labels) }, options: extraOpts.options });
}

function renderBar(id, data) {
  renderChart(id, 'bar', data, {
    datasets: (values, labels) => [{ data: values, backgroundColor: PAL.slice(0,labels.length).map(c=>c+'bb'), borderColor: PAL.slice(0,labels.length), borderWidth: 1.5, borderRadius: 7, borderSkipped: false }],
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false},ticks:{font:{size:10},color:'#9ca3af'}}, y:{beginAtZero:true,ticks:{precision:0,color:'#9ca3af',font:{size:10}},grid:{color:'#f3f4f6'}} } },
  });
}
function renderDoughnut(id, data) {
  renderChart(id, 'doughnut', data, {
    datasets: (values, labels) => [{ data: values, backgroundColor: PAL.slice(0,labels.length), borderWidth:2, borderColor:'#fff', hoverOffset:8 }],
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ font:{size:11}, padding:12, color:'#374151' } } }, cutout:'62%' },
  });
}

// ── PIVOTS ────────────────────────────────────────────────────────
function renderAllPivots() {
  renderPivot('responsible','נציג אחראי','status');
  renderPivot('source','מקור ליד','status');
  renderPivot('city','עיר','status');
  renderRawTable();
}

function renderPivot(rowKey, rowLabel, colKey) {
  const leads = S.filtered;
  const tbl   = document.getElementById('tbl-'+rowKey);
  document.getElementById('badge-'+rowKey).textContent = `${leads.length} לידים`;
  // When a filter is active on a dimension → show only the selected values.
  // Otherwise show all known options (so rows/cols appear even with zero leads).
  const dimValues = (key) => {
    if (S.filters[key]?.length) return [...S.filters[key]].sort();
    if (ALL_OPTIONS[key]?.length) return ALL_OPTIONS[key];
    return [...new Set(leads.map(l=>l[key]).filter(Boolean))].sort();
  };
  const rows = dimValues(rowKey);
  const cols = dimValues(colKey);
  if (!leads.length) {
    tbl.querySelector('thead').innerHTML='';
    tbl.querySelector('tbody').innerHTML=`<tr><td colspan="3"><div class="state-msg"><span class="icon">📭</span>אין נתונים</div></td></tr>`;
    return;
  }
  tbl.querySelector('thead').innerHTML=`<tr><th>${esc(rowLabel)}</th>${cols.map((c,i)=>`<th class="num" style="color:${PAL[i%PAL.length]}">${esc(c)}</th>`).join('')}<th class="num total-col">סה״כ</th></tr>`;
  const grandTotals={}; cols.forEach(c=>{grandTotals[c]=0;}); let grand=0;
  const allCounts=[];
  const bodyRows=rows.map(rv=>{
    const sub=leads.filter(l=>l[rowKey]===rv);
    const counts={}; cols.forEach(c=>{counts[c]=sub.filter(l=>l[colKey]===c).length; grandTotals[c]+=counts[c];});
    const rowTotal=sub.length; grand+=rowTotal;
    allCounts.push(...Object.values(counts));
    return {rv, counts, rowTotal};
  });
  const maxVal=Math.max(...allCounts,1);
  tbl.querySelector('tbody').innerHTML=bodyRows.map(({rv,counts,rowTotal})=>`<tr>
    <td class="row-name">${esc(rv)}</td>
    ${cols.map(c=>{const v=counts[c]; return `<td class="num">${v>0?`<strong>${v}</strong>`:'<span class="zero">—</span>'}</td>`;}).join('')}
    <td class="num total-col"><strong>${rowTotal}</strong></td>
  </tr>`).join('')+`<tr class="total-row"><td>סה״כ</td>${cols.map(c=>`<td class="num">${grandTotals[c]}</td>`).join('')}<td class="num total-col"><strong>${grand}</strong></td></tr>`;
}

function renderRawTable() {
  const leads = S.filtered;
  const tbl = document.getElementById('tbl-raw');
  document.getElementById('badge-raw').textContent = `${leads.length} רשומות`;
  if (!leads.length) { tbl.querySelector('thead').innerHTML=''; tbl.querySelector('tbody').innerHTML=`<tr><td><div class="state-msg"><span class="icon">📭</span>אין נתונים</div></td></tr>`; return; }
  const allKeys=[...(new Set(leads.flatMap(l=>Object.keys(l.raw||{}))))];
  tbl.querySelector('thead').innerHTML=`<tr><th>#</th><th>תאריך</th>${allKeys.map(k=>`<th>${esc(k)}</th>`).join('')}</tr>`;
  tbl.querySelector('tbody').innerHTML=leads.map((l,i)=>`<tr><td class="num">${i+1}</td><td>${l.date||'—'}</td>${allKeys.map(k=>{const v=l.raw?.[k]; return `<td>${(v===null||v===undefined||v==='')?'<span class="zero">—</span>':esc(String(v))}</td>`;}).join('')}</tr>`).join('');
}

// ── HELPERS ───────────────────────────────────────────────────────
const STATUS_COLORS = {
  'נרשם':                    '#10b981',
  'נרשם ללא אמצעי תשלום':   '#34d399',
  'נרשם זכיה':               '#6ee7b7',
  'המשך טיפול':              '#3b82f6',
  'מתלבטת חמה':              '#f59e0b',
  'מתלבטת קרה':              '#94a3b8',
  'מעוניינת בתקופה אחרת':   '#8b5cf6',
  'אין מענה':                '#64748b',
  'לא רלוונטי':              '#ef4444',
  'חדש':                     '#c084fc',
};
function statusBadge(val, key) {
  if (key !== 'status') return esc(val);
  const color = STATUS_COLORS[val] || '#94a3b8';
  return `<span class="status-badge" style="background:${color}22;color:${color};border:1px solid ${color}55">${esc(val)}</span>`;
}

// ── EXPORT ────────────────────────────────────────────────────────
function exportPivot(key) {
  const tbl=document.getElementById('tbl-'+key);
  const rows=[...tbl.querySelectorAll('tr')].map(tr=>[...tr.querySelectorAll('th,td')].map(td=>`"${td.innerText.trim().replace(/"/g,'""')}"`).join(','));
  dl('﻿'+rows.join('\r\n'),`pivot_${key}.csv`);
}
function exportRaw() {
  const tbl=document.getElementById('tbl-raw');
  const rows=[...tbl.querySelectorAll('tr')].map(tr=>[...tr.querySelectorAll('th,td')].map(td=>`"${td.innerText.trim().replace(/"/g,'""')}"`).join(','));
  dl('﻿'+rows.join('\r\n'),'leads_raw.csv');
}
function dl(content,name) {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'text/csv'}));
  a.download=name; a.click();
}

// ── DATE SHORTCUTS ────────────────────────────────────────────────
function setRange(r) {
  const t=new Date(), fmt=d=>d.toISOString().slice(0,10);
  let from='',to='';
  if (r==='today') { from=to=fmt(t); }
  else if (r==='week') { const w=new Date(t); w.setDate(w.getDate()-6); from=fmt(w); to=fmt(t); }
  else if (r==='month') { from=fmt(new Date(t.getFullYear(),t.getMonth(),1)); to=fmt(t); }
  else if (r==='year') { from=`${t.getFullYear()}-01-01`; to=fmt(t); }
  document.getElementById('f-from').value=from;
  document.getElementById('f-to').value=to;
  S.filters.from=from; S.filters.to=to;
  document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-r="${r}"]`)?.classList.add('active');
  applyFilters();
}

function resetAll() {
  S.filters={ from:'', to:'', responsible:[], source:[], city:[], status:[] };
  document.getElementById('f-from').value='';
  document.getElementById('f-to').value='';
  Object.values(MS).forEach(ms=>ms.clear());
  document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-r="all"]').classList.add('active');
  applyFilters();
}

// ── UTILS ─────────────────────────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── EVENTS ────────────────────────────────────────────────────────
document.getElementById('f-from').addEventListener('change', e=>{ S.filters.from=e.target.value; document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active')); applyFilters(); });
document.getElementById('f-to').addEventListener('change',   e=>{ S.filters.to=e.target.value;   document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active')); applyFilters(); });
document.getElementById('btn-reset').addEventListener('click', resetAll);
document.querySelectorAll('.sc-btn').forEach(b=>b.addEventListener('click',()=>setRange(b.dataset.r)));
document.querySelectorAll('.view-btn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const v=btn.dataset.view;
  document.getElementById('view-dashboard').style.display=v==='dashboard'?'flex':'none';
  document.getElementById('view-tables').style.display=v==='tables'?'flex':'none';
}));

loadData();
</script>
