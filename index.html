<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דשבורד לידים | אוריגמי</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-dark: #3730a3; --primary-light: #e0e7ff;
      --surface: #fff; --bg: #f1f5f9; --border: #e2e8f0;
      --text: #0f172a; --muted: #64748b;
      --radius: 14px; --shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 0 28px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(79,70,229,.3);
    }
    header h1 { color: #fff; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    #last-updated { color: rgba(255,255,255,.65); font-size: .73rem; }

    /* VIEW TOGGLE */
    .view-toggle {
      display: flex; background: rgba(255,255,255,.15); border-radius: 10px; padding: 3px; gap: 2px;
    }
    .view-btn {
      border: none; background: none; color: rgba(255,255,255,.75);
      padding: 6px 16px; border-radius: 8px; font-size: .84rem; font-weight: 700;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .view-btn.active { background: #fff; color: var(--primary); }

    main { padding: 20px 28px; max-width: 1500px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

    /* FILTER BAR */
    .filter-bar {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px 20px; box-shadow: var(--shadow); border: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
    }
    .fg { display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
    .fg label { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .fg select, .fg input[type=date] {
      border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 10px;
      font-size: .83rem; color: var(--text); background: var(--bg); outline: none; transition: border-color .15s;
    }
    .fg select:focus, .fg input:focus { border-color: var(--primary); background: var(--surface); }
    .shortcuts { display: flex; gap: 5px; flex-wrap: wrap; }
    .sc-btn {
      font-size: .72rem; border: 1.5px solid var(--border); background: var(--bg);
      border-radius: 7px; padding: 5px 10px; cursor: pointer; color: var(--muted);
      font-weight: 600; transition: all .15s;
    }
    .sc-btn:hover, .sc-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-reset {
      margin-right: auto; font-size: .82rem; border: 1.5px solid var(--border);
      background: var(--surface); border-radius: 8px; padding: 7px 16px;
      cursor: pointer; color: var(--muted); font-weight: 600; transition: all .15s;
    }
    .btn-reset:hover { border-color: #ef4444; color: #ef4444; }

    /* ── DASHBOARD VIEW ── */
    #view-dashboard { display: flex; flex-direction: column; gap: 18px; }
    #view-tables    { display: none;  flex-direction: column; gap: 18px; }

    /* KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
    .kpi-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 18px 20px; box-shadow: var(--shadow); border: 1px solid var(--border);
      position: relative; overflow: hidden; transition: transform .2s, box-shadow .2s;
    }
    .kpi-card::before { content:''; position:absolute; top:0;right:0;left:0; height:3px; background:var(--kc,var(--primary)); }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.1); }
    .kpi-label { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .kpi-value { font-size: 2rem; font-weight: 800; color: var(--kc, var(--primary)); line-height: 1; }
    .kpi-pct { font-size: .71rem; color: var(--muted); margin-top: 4px; }

    /* CHARTS */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:800px){ .charts-row { grid-template-columns: 1fr; } }
    .chart-card { background: var(--surface); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .chart-card h3 { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
    .chart-wrap { position: relative; height: 200px; }

    /* ── TABLES VIEW ── */
    .pivot-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
    .pivot-head {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(to left, #fafafa, var(--surface));
    }
    .pivot-head h3 { font-size: .9rem; font-weight: 800; }
    .pivot-total-badge {
      background: var(--primary-light); color: var(--primary);
      border-radius: 20px; padding: 2px 12px; font-size: .78rem; font-weight: 700;
    }
    .export-btn {
      margin-right: auto; font-size: .76rem; border: 1.5px solid var(--border);
      background: var(--surface); border-radius: 8px; padding: 6px 13px;
      cursor: pointer; color: var(--muted); font-weight: 700; transition: all .15s;
    }
    .export-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .81rem; }
    th {
      background: #f8fafc; padding: 10px 13px; text-align: right;
      font-size: .7rem; color: var(--muted); font-weight: 700;
      border-bottom: 2px solid var(--border); white-space: nowrap;
      letter-spacing: .03em; position: sticky; top: 0;
    }
    td { padding: 10px 13px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .total-row td { background: #f1f5f9 !important; font-weight: 700; border-top: 2px solid var(--border); }
    .total-col { font-weight: 700; color: var(--primary); }
    .row-name { font-weight: 600; }
    .zero { color: #cbd5e1; }
    .num { text-align: center; }

    /* STATE */
    .state-msg { padding: 48px; text-align: center; color: var(--muted); }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #ef4444; }
  </style>
</head>
<body>

<header>
  <h1>📊 דשבורד לידים – אוריגמי</h1>
  <div class="view-toggle">
    <button class="view-btn active" data-view="dashboard">📈 דשבורד</button>
    <button class="view-btn" data-view="tables">📋 טבלאות</button>
  </div>
  <span id="last-updated"></span>
</header>

<main>

  <!-- FILTERS -->
  <div class="filter-bar">
    <div class="fg">
      <label>מתאריך</label>
      <input type="date" id="f-from" />
    </div>
    <div class="fg">
      <label>עד תאריך</label>
      <input type="date" id="f-to" />
    </div>
    <div class="fg" style="min-width:auto">
      <label>קיצורי דרך</label>
      <div class="shortcuts">
        <button class="sc-btn" data-r="today">היום</button>
        <button class="sc-btn" data-r="yesterday">אתמול</button>
        <button class="sc-btn" data-r="week">שבוע</button>
        <button class="sc-btn" data-r="month">חודש</button>
        <button class="sc-btn" data-r="year">שנה</button>
        <button class="sc-btn active" data-r="all">הכל</button>
      </div>
    </div>
    <div class="fg">
      <label>נציג אחראי</label>
      <select id="f-responsible"><option value="">הכל</option></select>
    </div>
    <div class="fg">
      <label>מקור ליד</label>
      <select id="f-source"><option value="">הכל</option></select>
    </div>
    <div class="fg">
      <label>עיר</label>
      <select id="f-city"><option value="">הכל</option></select>
    </div>
    <button class="btn-reset" id="btn-reset">↺ איפוס</button>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="view-dashboard">
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">טוען...</div><div class="kpi-value">—</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card"><h3>לפי נציג אחראי</h3><div class="chart-wrap"><canvas id="chart-responsible"></canvas></div></div>
      <div class="chart-card"><h3>לפי מקור ליד</h3><div class="chart-wrap"><canvas id="chart-source"></canvas></div></div>
      <div class="chart-card"><h3>לפי סטטוס</h3><div class="chart-wrap"><canvas id="chart-status"></canvas></div></div>
      <div class="chart-card"><h3>לפי עיר</h3><div class="chart-wrap"><canvas id="chart-city"></canvas></div></div>
    </div>
  </div>

  <!-- TABLES VIEW -->
  <div id="view-tables">
    <!-- Pivot 1: by responsible -->
    <div class="pivot-card">
      <div class="pivot-head">
        <h3>לפי נציג אחראי</h3>
        <span class="pivot-total-badge" id="badge-responsible">0 לידים</span>
        <button class="export-btn" onclick="exportPivot('responsible')">⬇ Excel</button>
      </div>
      <div class="tbl-wrap"><table id="tbl-responsible"><thead></thead><tbody></tbody></table></div>
    </div>
    <!-- Pivot 2: by source -->
    <div class="pivot-card">
      <div class="pivot-head">
        <h3>לפי מקור ליד</h3>
        <span class="pivot-total-badge" id="badge-source">0 לידים</span>
        <button class="export-btn" onclick="exportPivot('source')">⬇ Excel</button>
      </div>
      <div class="tbl-wrap"><table id="tbl-source"><thead></thead><tbody></tbody></table></div>
    </div>
    <!-- Pivot 3: by status -->
    <div class="pivot-card">
      <div class="pivot-head">
        <h3>לפי סטטוס</h3>
        <span class="pivot-total-badge" id="badge-status">0 לידים</span>
        <button class="export-btn" onclick="exportPivot('status')">⬇ Excel</button>
      </div>
      <div class="tbl-wrap"><table id="tbl-status"><thead></thead><tbody></tbody></table></div>
    </div>
  </div>

</main>

<script>
// ── STATE ─────────────────────────────────────────────────────────
const S = {
  all: [], filtered: [],
  filters: { from:'', to:'', responsible:'', source:'', city:'' },
};
const CHARTS = {};
const PAL = ['#4f46e5','#7c3aed','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6','#14b8a6','#f97316','#84cc16','#0ea5e9','#a855f7'];

// ── PARSE ORIGAMI FORMAT ──────────────────────────────────────────
function parseInstance(inst) {
  const f = {};
  for (const grp of inst.field_groups || []) {
    for (const row of grp.fields_data || []) {
      if (!Array.isArray(row)) continue;
      for (const fld of row) {
        if (!fld.field_name) continue;
        const v = fld.value;
        if (v !== undefined && v !== null && v !== '') {
          f[fld.field_name.trim()] = v;
          if (fld.field_data_name) f[fld.field_data_name] = v;
        }
      }
    }
  }
  return f;
}

function normalizeLeads(json) {
  const rows = json.data || [];
  console.log('שדות ברשומה הראשונה:', rows[0] ? Object.keys(parseInstance(rows[0].instance_data)) : 'אין נתונים');
  return rows.map((item, i) => {
    const inst = item.instance_data;
    const f = parseInstance(inst);
    return {
      id:          inst._id ?? i,
      date:        inst.insertTimestamp?.slice(0,10) ?? '',
      name:        f['שם'] ?? f['שם מלא'] ?? f['שם פרטי'] ?? f['שם ושם משפחה'] ?? f['שם הליד'] ?? '',
      phone:       f['טלפון'] ?? f['נייד'] ?? f['פלאפון'] ?? f['מספר טלפון'] ?? '',
      city:        f['עיר'] ?? f['שם העיר'] ?? f['יישוב'] ?? '',
      source:      f['מקור הגעה'] ?? f['מקור'] ?? f['ספירה של מקור הליד'] ?? f['מקור ליד'] ?? '',
      responsible: f['אחראי מטפל'] ?? f['אחראי'] ?? f['נציג'] ?? f['נציג אחראי'] ?? f['משתמש אחראי'] ?? '',
      status:      f['סטטוס ליד'] ?? f['סטטוס'] ?? f['סטטוס של מקור הליד'] ?? f['מצב'] ?? '',
      raw: f,
    };
  });
}

// ── LOAD ──────────────────────────────────────────────────────────
async function loadData() {
  setLoading(true);
  try {
    const res = await fetch('/api/leads');
    if (!res.ok) throw new Error(`שגיאת שרת ${res.status}`);
    const json = await res.json();
    S.all = normalizeLeads(json);
    populateFilters();
    applyFilters();
    document.getElementById('last-updated').textContent = `עדכון: ${new Date().toLocaleTimeString('he-IL')}`;
  } catch(e) {
    document.getElementById('kpi-grid').innerHTML = `<div class="state-msg err">שגיאה: ${e.message}</div>`;
  } finally {
    setLoading(false);
  }
}

function setLoading(v) {
  if (v) document.getElementById('kpi-grid').innerHTML = `<div class="state-msg"><div class="spinner"></div><br>טוען נתונים...</div>`;
}

// ── FILTERS ───────────────────────────────────────────────────────
function populateFilters() {
  const u = k => [...new Set(S.all.map(l=>l[k]).filter(Boolean))].sort();
  fill('f-responsible', u('responsible'));
  fill('f-source',      u('source'));
  fill('f-city',        u('city'));
}
function fill(id, vals) {
  const el = document.getElementById(id);
  const cur = el.value;
  el.innerHTML = '<option value="">הכל</option>' + vals.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
  if (cur) el.value = cur;
}

function applyFilters() {
  const {from, to, responsible, source, city} = S.filters;
  S.filtered = S.all.filter(l => {
    if (from && l.date < from) return false;
    if (to   && l.date > to)   return false;
    if (responsible && l.responsible !== responsible) return false;
    if (source      && l.source      !== source)      return false;
    if (city        && l.city        !== city)         return false;
    return true;
  });
  renderDashboard();
  renderAllPivots();
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function renderDashboard() {
  const leads = S.filtered;
  const total = leads.length;
  const byStatus = groupBy(leads, 'status');
  const colors = PAL;

  const kpis = [
    { label: 'סה״כ לידים', val: total, color: '#4f46e5' },
    ...Object.entries(byStatus).map(([s,n],i) => ({ label: s||'ללא סטטוס', val: n, color: colors[(i+1)%colors.length] }))
  ];

  document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
    <div class="kpi-card" style="--kc:${k.color}">
      <div class="kpi-label">${esc(k.label)}</div>
      <div class="kpi-value">${k.val}</div>
      <div class="kpi-pct">${total&&k.label!=='סה״כ לידים' ? Math.round(k.val/total*100)+'%' : ''}</div>
    </div>`).join('');

  renderBar('chart-responsible', groupBy(leads,'responsible'));
  renderBar('chart-source',      groupBy(leads,'source'));
  renderBar('chart-city',        groupBy(leads,'city'));
  renderDoughnut('chart-status', groupBy(leads,'status'));
}

function groupBy(arr, key) {
  return arr.reduce((a,l) => { const v=l[key]||'ללא'; a[v]=(a[v]||0)+1; return a; }, {});
}

function renderBar(id, data) {
  const labels = Object.keys(data), values = Object.values(data);
  if (CHARTS[id]) CHARTS[id].destroy();
  CHARTS[id] = new Chart(document.getElementById(id).getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: PAL.slice(0,labels.length), borderRadius: 6, borderSkipped: false }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{grid:{display:false},ticks:{font:{size:11}}}, y:{beginAtZero:true,ticks:{precision:0},grid:{color:'#f1f5f9'}} } }
  });
}
function renderDoughnut(id, data) {
  const labels = Object.keys(data), values = Object.values(data);
  if (CHARTS[id]) CHARTS[id].destroy();
  CHARTS[id] = new Chart(document.getElementById(id).getContext('2d'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: PAL.slice(0,labels.length), borderWidth:2, borderColor:'#fff' }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ font:{size:11}, padding:10 } } }, cutout:'60%' }
  });
}

// ── PIVOT TABLES ──────────────────────────────────────────────────
function renderAllPivots() {
  renderPivot('responsible', 'נציג אחראי', 'status');
  renderPivot('source',      'מקור ליד',   'status');
  renderPivot('status',      'סטטוס',       'responsible');
}

function renderPivot(rowKey, rowLabel, colKey) {
  const leads = S.filtered;
  const tbl = document.getElementById('tbl-'+rowKey);
  const badge = document.getElementById('badge-'+rowKey);

  const rows = [...new Set(leads.map(l=>l[rowKey]).filter(Boolean))].sort();
  const cols = [...new Set(leads.map(l=>l[colKey]).filter(Boolean))].sort();

  badge.textContent = `${leads.length} לידים`;

  if (!leads.length) {
    tbl.querySelector('thead').innerHTML = '';
    tbl.querySelector('tbody').innerHTML = `<tr><td colspan="3"><div class="state-msg">אין נתונים</div></td></tr>`;
    return;
  }

  // Head
  tbl.querySelector('thead').innerHTML = `<tr>
    <th>${rowLabel}</th>
    ${cols.map(c=>`<th class="num">${esc(c)}</th>`).join('')}
    <th class="num total-col">סה״כ</th>
  </tr>`;

  // Body
  const grandTotals = {};
  cols.forEach(c => grandTotals[c]=0);
  let grandTotal = 0;

  const bodyRows = rows.map(rowVal => {
    const rowLeads = leads.filter(l=>l[rowKey]===rowVal);
    const counts = {};
    cols.forEach(c => { counts[c]=rowLeads.filter(l=>l[colKey]===c).length; grandTotals[c]+=counts[c]; });
    const rowTotal = rowLeads.length;
    grandTotal += rowTotal;
    return `<tr>
      <td class="row-name">${esc(rowVal)}</td>
      ${cols.map(c=>`<td class="num">${counts[c]>0?`<strong>${counts[c]}</strong>`:`<span class="zero">—</span>`}</td>`).join('')}
      <td class="num total-col">${rowTotal}</td>
    </tr>`;
  });

  const totalRow = `<tr class="total-row">
    <td>סה״כ</td>
    ${cols.map(c=>`<td class="num">${grandTotals[c]}</td>`).join('')}
    <td class="num total-col">${grandTotal}</td>
  </tr>`;

  tbl.querySelector('tbody').innerHTML = bodyRows.join('') + totalRow;
}

// ── EXPORT ────────────────────────────────────────────────────────
function exportPivot(key) {
  const tbl = document.getElementById('tbl-'+key);
  const rows = [...tbl.querySelectorAll('tr')].map(tr =>
    [...tr.querySelectorAll('th,td')].map(td => `"${td.innerText.trim().replace(/"/g,'""')}"`).join(',')
  );
  const bom = '﻿';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([bom+rows.join('\r\n')], {type:'text/csv'}));
  a.download = `pivot_${key}.csv`;
  a.click();
}

// ── DATE SHORTCUTS ────────────────────────────────────────────────
function setRange(r) {
  const t = new Date(), fmt = d=>d.toISOString().slice(0,10);
  let from='', to='';
  if (r==='today')     { from=to=fmt(t); }
  else if (r==='yesterday') { const y=new Date(t); y.setDate(y.getDate()-1); from=to=fmt(y); }
  else if (r==='week') { const w=new Date(t); w.setDate(w.getDate()-6); from=fmt(w); to=fmt(t); }
  else if (r==='month') { const m=new Date(t); m.setDate(1); from=fmt(m); to=fmt(t); }
  else if (r==='year') { from=`${t.getFullYear()}-01-01`; to=fmt(t); }
  document.getElementById('f-from').value=from;
  document.getElementById('f-to').value=to;
  S.filters.from=from; S.filters.to=to;
  document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-r="${r}"]`)?.classList.add('active');
  applyFilters();
}

// ── UTILS ─────────────────────────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── EVENTS ────────────────────────────────────────────────────────
document.getElementById('f-from').addEventListener('change', e=>{ S.filters.from=e.target.value; document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active')); applyFilters(); });
document.getElementById('f-to').addEventListener('change',   e=>{ S.filters.to=e.target.value;   document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active')); applyFilters(); });
document.getElementById('f-responsible').addEventListener('change', e=>{ S.filters.responsible=e.target.value; applyFilters(); });
document.getElementById('f-source').addEventListener('change',      e=>{ S.filters.source=e.target.value;      applyFilters(); });
document.getElementById('f-city').addEventListener('change',        e=>{ S.filters.city=e.target.value;        applyFilters(); });
document.getElementById('btn-reset').addEventListener('click', ()=>{
  ['f-from','f-to','f-responsible','f-source','f-city'].forEach(id=>document.getElementById(id).value='');
  S.filters={from:'',to:'',responsible:'',source:'',city:''};
  document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-r="all"]').classList.add('active');
  applyFilters();
});
document.querySelectorAll('.sc-btn').forEach(b=>b.addEventListener('click',()=>setRange(b.dataset.r)));
document.querySelectorAll('.view-btn').forEach(btn => btn.addEventListener('click', ()=>{
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const v = btn.dataset.view;
  document.getElementById('view-dashboard').style.display = v==='dashboard' ? 'flex' : 'none';
  document.getElementById('view-tables').style.display    = v==='tables'    ? 'flex' : 'none';
}));

loadData();
</script>
</body>
</html>
