<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דשבורד לידים | אוריגמי</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --primary-light: #e0e7ff;
      --surface: #ffffff;
      --bg: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --radius: 14px;
      --shadow: 0 2px 8px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-lg: 0 8px 24px rgba(0,0,0,.10);
    }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(79,70,229,.3);
    }
    header h1 { color: #fff; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    header h1 .icon { font-size: 1.4rem; }
    #last-updated { color: rgba(255,255,255,.7); font-size: .75rem; }

    main { padding: 24px 28px; max-width: 1500px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    /* FILTER BAR */
    .filter-bar {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 22px;
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
      border: 1px solid var(--border);
    }
    .filter-group { display: flex; flex-direction: column; gap: 5px; min-width: 140px; }
    .filter-group label { font-size: .72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
    .filter-group select, .filter-group input[type=date] {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 11px;
      font-size: .84rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .filter-group select:focus, .filter-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
      background: var(--surface);
    }
    .date-shortcuts { display: flex; gap: 5px; flex-wrap: wrap; }
    .shortcut-btn {
      font-size: .74rem;
      border: 1.5px solid var(--border);
      background: var(--bg);
      border-radius: 7px;
      padding: 5px 11px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all .15s;
      font-weight: 600;
    }
    .shortcut-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .shortcut-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-reset {
      margin-right: auto;
      font-size: .82rem;
      border: 1.5px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      padding: 8px 18px;
      cursor: pointer;
      color: var(--text-muted);
      font-weight: 600;
      transition: all .15s;
    }
    .btn-reset:hover { border-color: #ef4444; color: #ef4444; background: #fff5f5; }

    /* KPI CARDS */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; }
    .kpi-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0; left: 0;
      height: 3px;
      background: var(--kpi-color, var(--primary));
    }
    .kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .kpi-label { font-size: .75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
    .kpi-value { font-size: 2.2rem; font-weight: 800; line-height: 1; color: var(--kpi-color, var(--primary)); }
    .kpi-sub { font-size: .72rem; color: var(--text-muted); font-weight: 500; }
    .kpi-icon { position: absolute; top: 14px; left: 18px; font-size: 1.6rem; opacity: .12; }

    /* CHARTS */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 800px) { .charts-row { grid-template-columns: 1fr; } }
    .chart-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .chart-card h3 { font-size: .8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 200px; }

    /* PIVOT TABLE */
    .pivot-section {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .section-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: linear-gradient(to left, #fafafa, var(--surface));
    }
    .section-header h3 { font-size: .95rem; font-weight: 800; color: var(--text); }
    .search-input {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: .83rem;
      outline: none;
      width: 200px;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--primary); }
    .export-btns { display: flex; gap: 8px; margin-right: auto; }
    .export-btn {
      font-size: .78rem;
      border: 1.5px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      color: var(--text-muted);
      font-weight: 700;
      transition: all .15s;
    }
    .export-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    thead th {
      background: #f8fafc;
      padding: 11px 14px;
      text-align: right;
      font-size: .73rem;
      color: var(--text-muted);
      font-weight: 700;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      letter-spacing: .03em;
    }
    thead th:hover { color: var(--primary); background: var(--primary-light); }
    thead th.sort-asc, thead th.sort-desc { color: var(--primary); }
    td { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    /* Pivot specific */
    .pivot-total-row td { background: #f8fafc; font-weight: 700; border-top: 2px solid var(--border); }
    .pivot-total-col { font-weight: 700; color: var(--primary); }
    .pivot-name { font-weight: 600; }
    .pivot-zero { color: #cbd5e1; }
    .pivot-count { text-align: center; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .71rem;
      font-weight: 700;
      white-space: nowrap;
    }

    /* PAGINATION */
    .pagination {
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }
    .pagination-info { font-size: .78rem; color: var(--text-muted); }
    .pagination-btns { display: flex; gap: 5px; }
    .page-btn {
      border: 1.5px solid var(--border);
      background: var(--surface);
      border-radius: 7px;
      padding: 5px 11px;
      font-size: .78rem;
      cursor: pointer;
      min-width: 32px;
      text-align: center;
      transition: all .15s;
      font-weight: 600;
    }
    .page-btn:hover { border-color: var(--primary); color: var(--primary); }
    .page-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* TABS */
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); padding: 0 22px; }
    .tab-btn {
      border: none;
      background: none;
      padding: 12px 18px;
      font-size: .84rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn:hover { color: var(--primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* STATE */
    .state-msg { padding: 56px 20px; text-align: center; color: var(--text-muted); font-size: .9rem; }
    .spinner {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #ef4444; }
  </style>
</head>
<body>

<header>
  <h1><span class="icon">📊</span> דשבורד לידים – אוריגמי</h1>
  <span id="last-updated"></span>
</header>

<main>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>מתאריך</label>
      <input type="date" id="f-date-from" />
    </div>
    <div class="filter-group">
      <label>עד תאריך</label>
      <input type="date" id="f-date-to" />
    </div>
    <div class="filter-group" style="min-width:auto">
      <label>קיצורי דרך</label>
      <div class="date-shortcuts">
        <button class="shortcut-btn" data-range="today">היום</button>
        <button class="shortcut-btn" data-range="yesterday">אתמול</button>
        <button class="shortcut-btn" data-range="week">שבוע</button>
        <button class="shortcut-btn" data-range="month">חודש</button>
        <button class="shortcut-btn" data-range="year">שנה</button>
        <button class="shortcut-btn active" data-range="all">הכל</button>
      </div>
    </div>
    <div class="filter-group">
      <label>אחראי</label>
      <select id="f-responsible"><option value="">הכל</option></select>
    </div>
    <div class="filter-group">
      <label>מקור הגעה</label>
      <select id="f-source"><option value="">הכל</option></select>
    </div>
    <div class="filter-group">
      <label>עיר</label>
      <select id="f-city"><option value="">הכל</option></select>
    </div>
    <button class="btn-reset" id="btn-reset">↺ איפוס</button>
  </div>

  <!-- KPI CARDS -->
  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi-card" style="--kpi-color:#4f46e5">
      <span class="kpi-icon">📋</span>
      <div class="kpi-label">סה״כ לידים</div>
      <div class="kpi-value" id="kpi-total">—</div>
      <div class="kpi-sub">בטווח הנבחר</div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-row">
    <div class="chart-card">
      <h3>לפי מקור הגעה</h3>
      <div class="chart-wrap"><canvas id="chart-source"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>לפי אחראי</h3>
      <div class="chart-wrap"><canvas id="chart-responsible"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>לפי סטטוס</h3>
      <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>לפי עיר</h3>
      <div class="chart-wrap"><canvas id="chart-city"></canvas></div>
    </div>
  </div>

  <!-- TABLES -->
  <div class="pivot-section">
    <div class="section-header">
      <h3>ניתוח נתונים</h3>
      <div class="export-btns">
        <button class="export-btn" id="btn-csv">⬇ CSV</button>
        <button class="export-btn" id="btn-excel">⬇ Excel</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="pivot">לפי אחראי × סטטוס</button>
      <button class="tab-btn" data-tab="records">רשומות</button>
    </div>

    <!-- PIVOT TAB -->
    <div class="tab-content active" id="tab-pivot">
      <div class="table-wrap">
        <table id="pivot-table">
          <thead id="pivot-head"></thead>
          <tbody id="pivot-body"></tbody>
        </table>
      </div>
    </div>

    <!-- RECORDS TAB -->
    <div class="tab-content" id="tab-records">
      <div style="padding:12px 22px 0; display:flex; gap:12px; align-items:center;">
        <input class="search-input" id="tbl-search" type="search" placeholder="חיפוש..." />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="date">תאריך <span class="si">▲</span></th>
              <th data-col="name">שם <span class="si">▲</span></th>
              <th data-col="phone">טלפון <span class="si">▲</span></th>
              <th data-col="city">עיר <span class="si">▲</span></th>
              <th data-col="source">מקור הגעה <span class="si">▲</span></th>
              <th data-col="responsible">אחראי <span class="si">▲</span></th>
              <th data-col="status">סטטוס <span class="si">▲</span></th>
            </tr>
          </thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
      <div class="pagination">
        <span class="pagination-info" id="tbl-info"></span>
        <div class="pagination-btns" id="tbl-pages"></div>
      </div>
    </div>
  </div>

</main>

<script>
const state = {
  allLeads: [], filtered: [],
  sortCol: 'date', sortDir: 'desc',
  page: 1, pageSize: 25, search: '',
  filters: { dateFrom:'', dateTo:'', responsible:'', source:'', city:'' },
};
const CHARTS = {};
const PALETTE = ['#4f46e5','#7c3aed','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6','#14b8a6','#f97316','#84cc16','#0ea5e9'];

// ── API ───────────────────────────────────────────────────────────
async function loadData() {
  showState('tbl-body', 'loading');
  try {
    const res = await fetch('/api/leads');
    if (!res.ok) throw new Error(`שגיאת שרת ${res.status}`);
    const json = await res.json();
    console.log('RAW first record:', JSON.stringify(json?.[0] ?? json?.data?.[0] ?? json, null, 2));
    state.allLeads = normalizeLeads(json);
    populateFilters();
    applyFilters();
    updateLastUpdated();
  } catch (e) {
    showState('tbl-body', 'error', e.message);
  }
}

function normalizeLeads(json) {
  const rows = Array.isArray(json) ? json
             : json.data      ? json.data
             : json.entities  ? json.entities
             : json.result    ? json.result
             : json.instances ? json.instances
             : json.records   ? json.records
             : [];

  return rows.map((r, i) => ({
    id:          r.id ?? r.entity_id ?? r.instance_id ?? i,
    date:        r.date ?? r.created_at ?? r.creation_date ?? r.registration_date ?? r.תאריך ?? '',
    name:        r.name ?? r.full_name ?? r.contact_name ?? r.שם ?? r.שם_מלא ?? '',
    phone:       r.phone ?? r.mobile ?? r.telephone ?? r.טלפון ?? '',
    city:        r.city ?? r.city_name ?? r.עיר ?? '',
    source:      r.source ?? r.lead_source ?? r.arrival_source ?? r.מקור ?? r['מקור הגעה'] ?? '',
    responsible: r.responsible ?? r.owner ?? r.assigned_to ?? r.אחראי ?? r['אחראי מטפל'] ?? '',
    status:      r.status ?? r.lead_status ?? r.סטטוס ?? r['סטטוס ליד'] ?? '',
    raw:         r,
  }));
}

// ── FILTERS ───────────────────────────────────────────────────────
function populateFilters() {
  const unique = key => [...new Set(state.allLeads.map(l => l[key]).filter(Boolean))].sort();
  fillSelect('f-responsible', unique('responsible'));
  fillSelect('f-source',      unique('source'));
  fillSelect('f-city',        unique('city'));
}
function fillSelect(id, values) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = '<option value="">הכל</option>' + values.map(v => `<option value="${v}">${v}</option>`).join('');
  if (cur) sel.value = cur;
}

function applyFilters() {
  const { dateFrom, dateTo, responsible, source, city } = state.filters;
  const q = state.search.toLowerCase();
  state.filtered = state.allLeads.filter(l => {
    if (dateFrom && l.date && l.date < dateFrom) return false;
    if (dateTo   && l.date && l.date > dateTo)   return false;
    if (responsible && l.responsible !== responsible) return false;
    if (source      && l.source      !== source)      return false;
    if (city        && l.city        !== city)         return false;
    if (q && !Object.values(l).join(' ').toLowerCase().includes(q)) return false;
    return true;
  });
  state.page = 1;
  updateKPIs();
  updateCharts();
  renderPivot();
  renderTable();
}

// ── KPIs ──────────────────────────────────────────────────────────
function updateKPIs() {
  const leads = state.filtered;
  const total = leads.length;
  const byStatus = groupBy(leads, 'status');
  const statuses = Object.keys(byStatus);

  const statusColors = ['#4f46e5','#10b981','#f59e0b','#ef4444','#06b6d4','#7c3aed','#ec4899','#14b8a6','#f97316','#84cc16'];
  const icons = ['📋','✅','⏳','❌','🔵','🟣','🟠','🟢','🔴','🟡'];

  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = `
    <div class="kpi-card" style="--kpi-color:#4f46e5">
      <span class="kpi-icon">📋</span>
      <div class="kpi-label">סה״כ לידים</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-sub">בטווח הנבחר</div>
    </div>
    ${statuses.map((s, i) => `
      <div class="kpi-card" style="--kpi-color:${statusColors[i % statusColors.length]}">
        <span class="kpi-icon">${icons[i % icons.length]}</span>
        <div class="kpi-label">${esc(s)}</div>
        <div class="kpi-value">${byStatus[s]}</div>
        <div class="kpi-sub">${total ? Math.round(byStatus[s]/total*100) : 0}% מהסה״כ</div>
      </div>
    `).join('')}
  `;
  document.getElementById('kpi-total').textContent; // not needed anymore
}

// ── CHARTS ────────────────────────────────────────────────────────
function groupBy(arr, key) {
  return arr.reduce((acc, item) => {
    const v = item[key] || 'לא ידוע';
    acc[v] = (acc[v] || 0) + 1;
    return acc;
  }, {});
}

function updateCharts() {
  renderBarChart('chart-source',      groupBy(state.filtered, 'source'));
  renderBarChart('chart-responsible', groupBy(state.filtered, 'responsible'));
  renderBarChart('chart-city',        groupBy(state.filtered, 'city'));
  renderDoughnut('chart-status',      groupBy(state.filtered, 'status'));
}

function renderBarChart(id, data) {
  const labels = Object.keys(data);
  const values = Object.values(data);
  if (CHARTS[id]) CHARTS[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  CHARTS[id] = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: PALETTE.slice(0, labels.length), borderRadius: 6, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: '#f1f5f9' } }
      }
    }
  });
}

function renderDoughnut(id, data) {
  const labels = Object.keys(data);
  const values = Object.values(data);
  if (CHARTS[id]) CHARTS[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  CHARTS[id] = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: PALETTE.slice(0, labels.length), borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { font: { size: 11 }, padding: 10 } } },
      cutout: '60%'
    }
  });
}

// ── PIVOT TABLE ───────────────────────────────────────────────────
function renderPivot() {
  const leads = state.filtered;
  const allStatuses = [...new Set(leads.map(l => l.status).filter(Boolean))].sort();
  const allResponsibles = [...new Set(leads.map(l => l.responsible).filter(Boolean))].sort();

  if (!leads.length) {
    document.getElementById('pivot-head').innerHTML = '';
    document.getElementById('pivot-body').innerHTML = `<tr><td colspan="3"><div class="state-msg">אין נתונים להצגה</div></td></tr>`;
    return;
  }

  // Header
  const head = document.getElementById('pivot-head');
  head.innerHTML = `<tr>
    <th style="min-width:140px">אחראי מטפל</th>
    ${allStatuses.map(s => `<th class="pivot-count">${esc(s)}</th>`).join('')}
    <th class="pivot-count pivot-total-col">סה״כ</th>
  </tr>`;

  // Body
  const grandTotals = {};
  allStatuses.forEach(s => grandTotals[s] = 0);
  let grandTotal = 0;

  const rows = allResponsibles.map(responsible => {
    const responsibleLeads = leads.filter(l => l.responsible === responsible);
    const counts = {};
    allStatuses.forEach(s => {
      counts[s] = responsibleLeads.filter(l => l.status === s).length;
      grandTotals[s] += counts[s];
    });
    const rowTotal = responsibleLeads.length;
    grandTotal += rowTotal;
    return `<tr>
      <td class="pivot-name">${esc(responsible)}</td>
      ${allStatuses.map(s => `<td class="pivot-count">${counts[s] > 0 ? `<strong>${counts[s]}</strong>` : '<span class="pivot-zero">—</span>'}</td>`).join('')}
      <td class="pivot-count pivot-total-col">${rowTotal}</td>
    </tr>`;
  });

  // Grand total row
  const totalRow = `<tr class="pivot-total-row">
    <td><strong>סה״כ</strong></td>
    ${allStatuses.map(s => `<td class="pivot-count">${grandTotals[s]}</td>`).join('')}
    <td class="pivot-count pivot-total-col">${grandTotal}</td>
  </tr>`;

  document.getElementById('pivot-body').innerHTML = rows.join('') + totalRow;
}

// ── RECORDS TABLE ─────────────────────────────────────────────────
function renderTable() {
  const sorted = [...state.filtered].sort((a, b) => {
    const av = a[state.sortCol] ?? '';
    const bv = b[state.sortCol] ?? '';
    return state.sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
  const total = sorted.length;
  if (!total) { showState('tbl-body', 'empty'); return; }

  const pages = Math.max(1, Math.ceil(total / state.pageSize));
  state.page = Math.min(state.page, pages);
  const start = (state.page - 1) * state.pageSize;
  const rows = sorted.slice(start, start + state.pageSize);

  const statusColors = ['#4f46e5','#10b981','#f59e0b','#ef4444','#06b6d4','#7c3aed','#ec4899','#14b8a6','#f97316','#84cc16'];
  const uniqueStatuses = [...new Set(state.allLeads.map(l => l.status).filter(Boolean))].sort();
  const statusColorMap = {};
  uniqueStatuses.forEach((s, i) => { statusColorMap[s] = statusColors[i % statusColors.length]; });

  document.getElementById('tbl-body').innerHTML = rows.map(l => {
    const color = statusColorMap[l.status] ?? '#64748b';
    return `<tr>
      <td>${formatDate(l.date)}</td>
      <td><strong>${esc(l.name)}</strong></td>
      <td dir="ltr">${esc(l.phone)}</td>
      <td>${esc(l.city)}</td>
      <td>${esc(l.source)}</td>
      <td>${esc(l.responsible)}</td>
      <td><span class="badge" style="background:${color}22;color:${color}">${esc(l.status)}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('tbl-info').textContent = `מציג ${start+1}–${Math.min(start+state.pageSize,total)} מתוך ${total}`;
  renderPagination(pages);
}

function renderPagination(pages) {
  const p = state.page;
  const range = [...new Set([1, Math.max(1,p-1), p, Math.min(pages,p+1), pages])].sort((a,b)=>a-b);
  let btns = `<button class="page-btn" ${p===1?'disabled':''} onclick="goPage(${p-1})">‹</button>`;
  let prev = 0;
  range.forEach(n => {
    if (n - prev > 1) btns += `<button class="page-btn" disabled>…</button>`;
    btns += `<button class="page-btn ${n===p?'active':''}" onclick="goPage(${n})">${n}</button>`;
    prev = n;
  });
  btns += `<button class="page-btn" ${p===pages?'disabled':''} onclick="goPage(${p+1})">›</button>`;
  document.getElementById('tbl-pages').innerHTML = btns;
}
function goPage(n) { state.page = n; renderTable(); }

// ── EXPORT ────────────────────────────────────────────────────────
function exportCSV() {
  const h = ['תאריך','שם','טלפון','עיר','מקור הגעה','אחראי','סטטוס'];
  const rows = state.filtered.map(l => [l.date,l.name,l.phone,l.city,l.source,l.responsible,l.status].map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(','));
  download('﻿'+[h.join(','),...rows].join('\r\n'), 'leads.csv', 'text/csv');
}
function exportExcel() {
  const h = ['תאריך','שם','טלפון','עיר','מקור הגעה','אחראי','סטטוס'];
  const rows = state.filtered.map(l=>`<tr>${[l.date,l.name,l.phone,l.city,l.source,l.responsible,l.status].map(v=>`<td>${esc(String(v??''))}</td>`).join('')}</tr>`);
  const xml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><table dir="rtl"><tr>${h.map(v=>`<th>${v}</th>`).join('')}</tr>${rows.join('')}</table></body></html>`;
  download('﻿'+xml, 'leads.xls', 'application/vnd.ms-excel');
}
function download(content, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
}

// ── DATE SHORTCUTS ────────────────────────────────────────────────
function setDateRange(range) {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  let from = '', to = '';
  if (range==='today')     { from = to = fmt(today); }
  else if (range==='yesterday') { const y=new Date(today); y.setDate(y.getDate()-1); from=to=fmt(y); }
  else if (range==='week') { const w=new Date(today); w.setDate(w.getDate()-6); from=fmt(w); to=fmt(today); }
  else if (range==='month') { const m=new Date(today); m.setDate(1); from=fmt(m); to=fmt(today); }
  else if (range==='year') { from=`${today.getFullYear()}-01-01`; to=fmt(today); }
  document.getElementById('f-date-from').value = from;
  document.getElementById('f-date-to').value   = to;
  state.filters.dateFrom = from;
  state.filters.dateTo   = to;
  document.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-range="${range}"]`)?.classList.add('active');
  applyFilters();
}

// ── UTILS ─────────────────────────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(d) {
  if (!d) return '';
  const p = String(d).slice(0,10).split('-');
  return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
}
function updateLastUpdated() {
  document.getElementById('last-updated').textContent = `עדכון: ${new Date().toLocaleTimeString('he-IL')}`;
}
function showState(id, type, msg='') {
  document.getElementById(id).innerHTML = `<tr><td colspan="10"><div class="state-msg ${type==='error'?'error-msg':''}">
    ${type==='loading'?'<div class="spinner"></div><br>טוען נתונים...':''}
    ${type==='empty'?'לא נמצאו נתונים':''}
    ${type==='error'?`שגיאה: ${msg}`:''}
  </div></td></tr>`;
}

// ── EVENTS ────────────────────────────────────────────────────────
document.getElementById('f-date-from').addEventListener('change', e => { state.filters.dateFrom=e.target.value; document.querySelectorAll('.shortcut-btn').forEach(b=>b.classList.remove('active')); applyFilters(); });
document.getElementById('f-date-to').addEventListener('change',   e => { state.filters.dateTo=e.target.value;   document.querySelectorAll('.shortcut-btn').forEach(b=>b.classList.remove('active')); applyFilters(); });
document.getElementById('f-responsible').addEventListener('change', e => { state.filters.responsible=e.target.value; applyFilters(); });
document.getElementById('f-source').addEventListener('change',      e => { state.filters.source=e.target.value;      applyFilters(); });
document.getElementById('f-city').addEventListener('change',        e => { state.filters.city=e.target.value;        applyFilters(); });
document.getElementById('tbl-search').addEventListener('input',     e => { state.search=e.target.value; applyFilters(); });
document.getElementById('btn-reset').addEventListener('click', () => {
  ['f-date-from','f-date-to','f-responsible','f-source','f-city'].forEach(id => document.getElementById(id).value='');
  document.getElementById('tbl-search').value='';
  state.filters={dateFrom:'',dateTo:'',responsible:'',source:'',city:''};
  state.search='';
  document.querySelectorAll('.shortcut-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-range="all"]').classList.add('active');
  applyFilters();
});
document.querySelectorAll('.shortcut-btn').forEach(b => b.addEventListener('click', () => setDateRange(b.dataset.range)));
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
}));
document.querySelectorAll('th[data-col]').forEach(th => th.addEventListener('click', () => {
  const col = th.dataset.col;
  state.sortDir = state.sortCol===col ? (state.sortDir==='asc'?'desc':'asc') : 'asc';
  state.sortCol = col;
  renderTable();
}));
document.getElementById('btn-csv').addEventListener('click', exportCSV);
document.getElementById('btn-excel').addEventListener('click', exportExcel);

loadData();
</script>
</body>
</html>
